name: worldstage-client-desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            dist_args: --linux --x64
          - os: windows-latest
            dist_args: --win --x64
          - os: macos-latest
            dist_args: --mac --x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install Linux rpm tooling
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Build desktop package
        run: npm run desktop:dist -- ${{ matrix.dist_args }}
        env:
          WORLDSTAGE_CLIENT_PUBLISH: never
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worldstage-client-${{ matrix.os }}
          path: |
            release/WorldStageClient-*
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: worldstage-client-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="${tag#v}"

          gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1 || gh release create "$tag" --repo "$GH_REPO" --title "$title" --notes ""

          mapfile -t files < <(find release-artifacts -maxdepth 1 -type f \
            \( -name 'WorldStageClient-*' -o -name 'latest*.yml' -o -name '*.blockmap' \) \
            | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts were downloaded." >&2
            exit 1
          fi

          gh release upload "$tag" --repo "$GH_REPO" "${files[@]}" --clobber
